<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naruto vs Sasuke: Shinobi Techniques</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', sans-serif; }
    
        #ui {
            position: absolute;
            top: 8%;
            width: 100%;
            text-align: center;
            color: #fff;
            pointer-events: none;
            z-index: 10;
        }
        
        h1 { 
            font-size: 3.5rem; margin: 0; letter-spacing: 12px; 
            font-weight: 900; 
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            background: linear-gradient(to bottom, #fff, #f00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        #technique-name { 
            font-size: 1.4rem; color: #ff4500; margin-top: 15px; 
            font-weight: bold; letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 69, 0, 0.6);
        }

        #video-container {
            position: absolute;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%) scaleX(-1);
            width: 320px;
            height: 240px; 
            border: 2px solid rgba(0, 212, 255, 0.3);
            z-index: 20;
            background-color: #000; 
            border-radius: 15px;
            overflow: hidden;
        }

        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        #grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="grain"></div>

    <div id="ui">
        <h1>ナルト • サスケ</h1>
        <div id="technique-name">CHAKRA CONCENTRATION</div>
    </div>

    <div id="video-container">
        <video class="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 60;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const COUNT = 20000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(COUNT * 3);
    const colors = new Float32Array(COUNT * 3);
    const sizes = new Float32Array(COUNT);
    
    const targetPositions = new Float32Array(COUNT * 3);
    const targetColors = new Float32Array(COUNT * 3);
    const targetSizes = new Float32Array(COUNT);

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const particles = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.35, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false }));
    scene.add(particles);

    // --- Techniques Generators ---

    function getSharingan(i) {
        // Outer Red Ring
        if (i < COUNT * 0.4) {
            const angle = Math.random() * Math.PI * 2;
            const r = 25 + (Math.random() - 0.5) * 1.5;
            return { x: r * Math.cos(angle), y: r * Math.sin(angle), z: 0, r: 0.8, g: 0, b: 0, s: 1.2 };
        } 
        // Three Tomoe (Comma shapes)
        else if (i < COUNT * 0.8) {
            const tomoeIndex = Math.floor((i / (COUNT * 0.4)) % 3);
            const baseAngle = (tomoeIndex * Math.PI * 2 / 3);
            const t = Math.random() * 2.5;
            const r = 16 + t * 2;
            const angle = baseAngle + Math.sin(t) * 0.5;
            return { x: r * Math.cos(angle), y: r * Math.sin(angle), z: 0, r: 0, g: 0, b: 0, s: 2.0 }; // Black tomoe
        }
        // Inner Pupil
        return { x: (Math.random()-0.5)*3, y: (Math.random()-0.5)*3, z: 0, r: 0.1, g: 0, b: 0, s: 3.0 };
    }

    function getMangekyou(i) {
        const total = COUNT;
        // Central Star/Blade Logic
        if (i < total * 0.6) {
            const blades = 3;
            const t = Math.random() * Math.PI * 2;
            const r = (Math.cos(blades * t) * 15) + 10;
            return { x: r * Math.cos(t), y: r * Math.sin(t), z: (Math.random()-0.5)*2, r: 0.6, g: 0, b: 0, s: 1.5 };
        } 
        // Swirling Dark Aura
        const rad = 20 + Math.random() * 40;
        const ang = Math.random() * Math.PI * 2;
        return { x: rad * Math.cos(ang), y: rad * Math.sin(ang), z: (Math.random()-0.5)*30, r: 0.2, g: 0, b: 0.05, s: 0.8 };
    }

    function getChidori(i) {
        // High density electric core
        if (i < COUNT * 0.3) {
            const r = Math.random() * 6;
            const theta = Math.random() * Math.PI * 2;
            return { x: r * Math.cos(theta), y: r * Math.sin(theta), z: (Math.random()-0.5)*8, r: 0.8, g: 1.0, b: 1.0, s: 2.5 };
        }
        // Lightning Branches
        const len = 10 + Math.random() * 50;
        const ang = Math.random() * Math.PI * 2;
        const off = (Math.random()-0.5)*15;
        return { x: len * Math.cos(ang), y: len * Math.sin(ang), z: off, r: 0.0, g: 0.7, b: 1.0, s: 1.0 };
    }

    function getRasengan(i) {
        const r = 18;
        // Internal Spiral Motion
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const spiralOff = (i / COUNT) * 10;
        const radius = (Math.random() * r);
        
        return { 
            x: radius * Math.sin(phi) * Math.cos(theta + spiralOff), 
            y: radius * Math.sin(phi) * Math.sin(theta + spiralOff), 
            z: radius * Math.cos(phi), 
            r: 0.2, g: 0.6, b: 1.0, s: 1.5 
        };
    }

    // --- State Management ---
    let currentTech = 'neutral';
    let shakeIntensity = 0;
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    let glowColor = '#00ffff';

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75 });

    hands.onResults((results) => {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        let detected = 'neutral';

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const lm = results.multiHandLandmarks[0];
            drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, {color: glowColor, lineWidth: 3});

            const isUp = (finger) => {
                const tips = [8, 12, 16, 20];
                const pips = [6, 10, 14, 18];
                return lm[tips[finger]].y < lm[pips[finger]].y;
            };

            const pinch = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);
            
            // Gesture Mapping
            if (pinch < 0.05) detected = 'chidori';
            else if (isUp(0) && isUp(1) && isUp(2) && isUp(3)) detected = 'rasengan';
            else if (isUp(0) && isUp(1) && !isUp(2)) detected = 'sharingan';
            else if (isUp(0) && isUp(1) && isUp(2) && !isUp(3)) detected = 'mangekyou';
        }
        updateState(detected);
    });

    function updateState(tech) {
        if(currentTech === tech) return;
        currentTech = tech;
        const nameEl = document.getElementById('technique-name');
        shakeIntensity = (tech === 'chidori' || tech === 'mangekyou') ? 0.5 : 0;

        if(tech === 'sharingan') { glowColor = '#ff0000'; nameEl.innerText = "Sharingan: Copy Wheel Eye"; bloomPass.strength = 2.0; }
        else if(tech === 'mangekyou') { glowColor = '#ff0000'; nameEl.innerText = "Mangekyou Sharingan"; bloomPass.strength = 3.0; }
        else if(tech === 'chidori') { glowColor = '#00ffff'; nameEl.innerText = "Chidori: One Thousand Birds"; bloomPass.strength = 4.5; }
        else if(tech === 'rasengan') { glowColor = '#00aaff'; nameEl.innerText = "Rasengan: Spiraling Sphere"; bloomPass.strength = 3.5; }
        else { glowColor = '#00ffff'; nameEl.innerText = "Neutral Chakra State"; bloomPass.strength = 1.0; }

        for(let i=0; i<COUNT; i++) {
            let p;
            if(tech === 'neutral') {
                const r = 10 + Math.random()*30; const t = Math.random()*6.28; const ph = Math.random()*3.14;
                p = { x: r*Math.sin(ph)*Math.cos(t), y: r*Math.sin(ph)*Math.sin(t), z: r*Math.cos(ph), r: 0.1, g: 0.2, b: 0.4, s: 0.5 };
            }
            else if(tech === 'sharingan') p = getSharingan(i);
            else if(tech === 'mangekyou') p = getMangekyou(i);
            else if(tech === 'chidori') p = getChidori(i);
            else if(tech === 'rasengan') p = getRasengan(i);
            
            targetPositions[i*3] = p.x; targetPositions[i*3+1] = p.y; targetPositions[i*3+2] = p.z;
            targetColors[i*3] = p.r; targetColors[i*3+1] = p.g; targetColors[i*3+2] = p.b;
            targetSizes[i] = p.s;
        }
    }

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            await hands.send({image: videoElement});
        }, width: 640, height: 480
    });
    cameraUtils.start();

    // --- Animation Loop ---
    function animate() {
        requestAnimationFrame(animate);
        
        // Dynamic Camera Shake
        if (shakeIntensity > 0) {
            renderer.domElement.style.transform = `translate(${(Math.random()-0.5)*shakeIntensity*50}px, ${(Math.random()-0.5)*shakeIntensity*50}px)`;
        } else {
            renderer.domElement.style.transform = 'translate(0,0)';
        }

        const pos = particles.geometry.attributes.position.array;
        const col = particles.geometry.attributes.color.array;
        const siz = particles.geometry.attributes.size.array;

        // Smooth Interpolation
        for(let i=0; i<COUNT*3; i++) {
            pos[i] += (targetPositions[i] - pos[i]) * 0.12;
            col[i] += (targetColors[i] - col[i]) * 0.12;
            
            // Chidori Turbulence Effect
            if(currentTech === 'chidori') {
                pos[i] += (Math.random() - 0.5) * 1.5;
            }
        }
        for(let i=0; i<COUNT; i++) siz[i] += (targetSizes[i] - siz[i]) * 0.1;

        particles.geometry.attributes.position.needsUpdate = true;
        particles.geometry.attributes.color.needsUpdate = true;
        particles.geometry.attributes.size.needsUpdate = true;
        
        // State-Based Rotation Logic
        if (currentTech === 'sharingan' || currentTech === 'mangekyou') {
            // LOCK TO FLAT PLANE: Face camera perfectly
            particles.rotation.x = 0;
            particles.rotation.y = 0;
            
            // Only rotate on Z axis
            if (currentTech === 'sharingan') {
                particles.rotation.z -= 0.015; // Slow smooth rotation
            } else {
                particles.rotation.z -= 0.06;  // Dramatic fast rotation
            }
        } 
        else if (currentTech === 'rasengan') {
            // Standard 3D orbital rotation
            particles.rotation.y += 0.15;
            particles.rotation.x += 0.05;
            particles.rotation.z = 0; // Optional: clean up Z if coming from eye modes
        } 
        else if (currentTech === 'chidori') {
            // Chaotic jitter rotation
            particles.rotation.z += 0.01;
            particles.rotation.x = 0;
            particles.rotation.y = 0;
        } 
        else {
            // Neutral slow idle
            particles.rotation.y += 0.005;
            particles.rotation.x = 0;
            particles.rotation.z = 0;
        }

        composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
